# Reconstruction defaults: general -> input -> output -> averaging -> wedge

# --- General ---
pixel_size: 4.284  # Angstrom per pixel for origin conversion and filtering
tomogram_size: [2000, 2000, 800]  # reference tomogram size [nx,ny,nz] when needed
log_level: info  # logging level: debug|info|warning|error
log_file: /home/muwang/Documents/GitHub/dynamo-python/slurm_example/output/reconstruction/reconstruction.log  # log output file; relative path defaults to YAML directory
error_log_file: /home/muwang/Documents/GitHub/dynamo-python/slurm_example/output/reconstruction/reconstruction.error.log  # error output file; relative path defaults to YAML directory
progress_log_every: 10  # write progress log every N particles

# --- Input ---
particles: /home/muwang/Documents/GitHub/dynamo-python/slurm_example/output/crop/particles.star  # required: particle metadata path (.tbl or .star)
subtomograms: /home/muwang/Documents/GitHub/dynamo-python/slurm_example/output/crop/subtomograms  # required: subtomogram directory or explicit input source
vll: null  # optional: Dynamo .vll for tbl workflows
tags: null  # optional: explicit subset of particle tags to average

# --- Output ---
output: /home/muwang/Documents/GitHub/dynamo-python/slurm_example/output/reconstruction/average.mrc  # required: output averaged volume path

# --- Averaging ---
sidelength: 64  # required: subtomogram edge length in voxels
symmetry: c1  # point-group symmetry (c1,c2,c4,...)
fmask: null  # optional Fourier-space mask path
nmask: null  # optional real-space mask (.mrc); nonzero voxels contribute to reconstruction

# --- Wedge (Dynamo table cols 13-17) ---
apply_wedge: false  # true to apply missing wedge in reconstruction
wedge_ftype: 1  # wedge type: 0 full, 1 Y-single, 2 X-single, 3 cone, 4 double
wedge_ymin: -48  # Y-axis minimum tilt angle (degrees)
wedge_ymax: 48  # Y-axis maximum tilt angle (degrees)
wedge_xmin: -60  # X-axis minimum tilt angle (degrees; ftype 2/4)
wedge_xmax: 60  # X-axis maximum tilt angle (degrees; ftype 2/4)
fcompensate: false  # true to divide by wedge weight sum in Fourier domain
