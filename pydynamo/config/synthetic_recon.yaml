# Synthetic reconstruction example (no wedge): general -> input -> output -> averaging -> wedge

# --- General ---
pixel_size: 4.284                                   # Angstrom per pixel used for origin conversion
tomogram_size: [1000, 1000, 800]                    # reference tomogram size [nx,ny,nz]
log_level: info                                     # logging level: debug|info|warning|error
log_file: reconstruction.log                        # log output file; relative path defaults to YAML directory
error_log_file: reconstruction.error.log            # error output file; relative path defaults to YAML directory

# --- Input ---
particles: ../synthetic_data/out_subtomograms/particles.star  # particle metadata input
subtomograms: ../synthetic_data/out_subtomograms              # subtomogram directory input
vll: null                                           # optional vll path for tbl workflows
tags: null                                          # optional subset of particle tags for averaging

# --- Output ---
output: ../synthetic_data/out_subtomograms/average.mrc  # averaged output volume path

# --- Averaging ---
sidelength: 64                                      # subtomogram edge length in voxels
symmetry: c1                                        # symmetry group (c1,c2,c4,...)
fmask: null                                         # optional Fourier mask path
nmask: null                                         # optional real-space mask path

# --- Wedge ---
apply_wedge: false                                  # whether to apply wedge weighting
wedge_ftype: 1                                      # wedge type: 0 full,1 Y-single,2 X-single,3 cone,4 double
wedge_ymin: -48                                     # Y-axis minimum tilt angle (degrees)
wedge_ymax: 48                                      # Y-axis maximum tilt angle (degrees)
wedge_xmin: -60                                     # X-axis minimum tilt angle (degrees)
wedge_xmax: 60                                      # X-axis maximum tilt angle (degrees)
fcompensate: false                                  # divide by wedge weights in Fourier domain when true
