# Synthetic classification (MRA) example: general -> input -> output -> iteration -> alignment -> device

# --- General ---
pixel_size: 4.284                                                # Angstrom per pixel for conversion/filter
log_level: info                                                  # logging level: debug|info|warning|error
log_file: classification.log                                     # log output file; relative path defaults to YAML directory
error_log_file: classification.error.log                         # error output file; relative path defaults to YAML directory

# --- Input ---
particles: ../synthetic_data/out_tomograms4classification/particles.star  # particle metadata
subtomograms: ../synthetic_data/out_tomograms4classification              # subtomogram directory
references:                                                                # list of reference volumes
  - ../synthetic_data/emd_32820_bin4.mrc                                  # reference #1
  - ../synthetic_data/emd_32820_bin4.mrc                                  # reference #2
tables: null                                                     # optional initial tables list per reference
vll: null                                                        # optional vll path for tbl workflows

# --- Output ---
output_dir: ../synthetic_data/mra_output                         # output root directory
output_average: null                                             # optional final average output .mrc for single-reference classification
output_average_dir: null                                         # optional directory for final averages; default uses output_dir
average_symmetry: c1                                             # symmetry applied to final average volume(s) (c1,c2,c4,...)

# --- Iteration ---
max_iterations: 2                                                # number of MRA iterations
swap: true                                                       # true: each particle compares all references
threshold: 0.0                                                   # optional CC threshold for averaging selection

# --- Alignment ---
cone_step: 30.0                                                  # tilt search step (degrees)
cone_range: [0, 180]                                             # cone aperture [min,max] (degrees) around old orientation
inplane_step: 30.0                                               # inplane search step (degrees)
inplane_range: [0, 360]                                          # inplane aperture [min,max] (degrees) around seed narot
shift_search: 3                                                  # translational search radius (voxels)
shift_mode: cube                                                 # shift search region: cube|ellipsoid_center|ellipsoid_follow
subpixel: true                                                   # true enables local subpixel refinement of best integer shift
cc_mode: ncc                                                     # correlation backend: ncc|roseman_local
cc_local_window: 5                                            # local correlation window size (odd voxels) for roseman_local
cc_local_eps: 1.0e-8                                          # numerical epsilon for local variance stabilization
multigrid_levels: 2                                              # coarse-to-fine levels
lowpass: null                                                    # optional lowpass cutoff in Angstrom
nmask: null                                                      # optional real-space mask (.mrc); nonzero voxels are used in alignment/averaging

# --- Device ---
device: auto                                                     # cpu|cuda|auto; auto uses all detected GPUs
device_id: null                                                  # optional single GPU id override
gpu_ids: null                                                    # optional explicit GPU id list; null means all detected GPUs
