# Reconstruction command — defaults
# Order: general → I/O → average → wedge

# --- General ---
pixel_size: 4.284
tomogram_size: [2000, 2000, 800]
log_level: info

# --- Input ---
particles: null          # path to .tbl or .star
subtomograms: null       # path to dir or star with rlnImageName
vll: null
tags: null               # optional: subset of tags to average

# --- Output ---
output: output/average.mrc

# --- Average ---
sidelength: 64
symmetry: c1             # c1, c2, c4, etc.
fmask: null              # Fourier mask path
nmask: null              # real-space mask path

# --- Wedge (Dynamo tbl cols 13-17) ---
apply_wedge: false       # apply missing wedge when averaging
wedge_ftype: 1           # 0=full, 1=single(Y), 2=singlex(X), 3=cone, 4=double
wedge_ymin: -48          # Y tilt range min (deg)
wedge_ymax: 48           # Y tilt range max (deg)
wedge_xmin: -60          # X tilt range min (ftype 2/4)
wedge_xmax: 60           # X tilt range max (ftype 2/4)
fcompensate: false       # Fourier compensation: divide by wedge weight sum
